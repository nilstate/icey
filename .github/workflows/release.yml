name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag and release metadata
        run: |
          tag="${GITHUB_REF_NAME}"
          git fetch origin main --no-tags
          case "$tag" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "expected a plain semantic version tag, got: $tag" >&2
              exit 1
              ;;
          esac
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main || {
            echo "release tags must point to commits reachable from origin/main" >&2
            exit 1
          }
          ./scripts/release-check.sh "$tag"

      - name: Extract changelog
        run: |
          awk '/^## \['"${GITHUB_REF_NAME}"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: icey ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
