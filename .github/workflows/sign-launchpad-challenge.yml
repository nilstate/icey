name: Sign Launchpad Challenge

on:
  workflow_dispatch:
    inputs:
      message_b64:
        description: Base64-encoded challenge text to clear-sign
        required: true
        type: string

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Import signing key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/launchpad-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s\n' "$PPA_GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$PPA_GPG_PASSPHRASE" --import
          key_id="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^sec:/ { print $5; exit }')"
          if [[ -z "$key_id" ]]; then
            echo "Failed to import PPA signing key" >&2
            exit 1
          fi
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "PPA_SIGNING_KEY_ID=$key_id" >> "$GITHUB_ENV"

      - name: Sign challenge
        env:
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
          MESSAGE_B64: ${{ inputs.message_b64 }}
        run: |
          printf '%s' "$MESSAGE_B64" | base64 --decode > challenge.txt
          gpg --batch --yes --pinentry-mode loopback --passphrase "$PPA_GPG_PASSPHRASE" \
            --local-user "$PPA_SIGNING_KEY_ID" --output signed.txt --clearsign challenge.txt

      - uses: actions/upload-artifact@v4
        with:
          name: launchpad-challenge-signature
          path: signed.txt
